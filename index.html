<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoraAli - Motorista</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8fafc; }
        .card { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        #form-section, #login-section { display: none; }
        img { width: 80px; border-radius: 50%; margin-bottom: 10px; border: 3px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <h2>BoraAli 🚗</h2>
        <div id="status">Carregando sistema...</div>
        <div id="login-section">
            <button onclick="login()">Entrar com Google</button>
        </div>
        <div id="form-section">
            <img id="foto" src="">
            <p>Bem-vindo, <strong id="nome"></strong>!</p>
            <input type="text" id="tel" placeholder="Seu WhatsApp">
            <button onclick="salvar()">Confirmar e Salvar</button>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://ehemdcucqzfwvbomynr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoZW1kY3VjcXpmd2V2Ym9teW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjkxNzksImV4cCI6MjA5MDg0NTE3OX0.TCp09qdrquyCNfdbgpLpMNJWA0wSMTJZcJu5CAcZ5ro';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        async function login() { await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } }); }
        supabaseClient.auth.onAuthStateChange((event, session) => {
            document.getElementById('status').style.display = 'none';
            if (session) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('form-section').style.display = 'block';
                document.getElementById('nome').innerText = session.user.user_metadata.full_name;
                document.getElementById('foto').src = session.user.user_metadata.avatar_url;
            } else { document.getElementById('login-section').style.display = 'block'; }
        });
        async function salvar() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const { error } = await supabaseClient.from('profiles').upsert({ id: session.user.id, full_name: session.user.user_metadata.full_name, phone: document.getElementById('tel').value });
            if (error) alert("Erro: " + error.message); else alert("Cadastro realizado!");
        }
    </script>
</body>
</html>
