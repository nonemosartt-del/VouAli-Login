<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoraAli - Motorista</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8fafc; }
        .card { background: white; padding: 40px 30px; border-radius: 24px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        h2 { color: #0f172a; margin-bottom: 24px; font-weight: 800; }
        input, select, button { width: 100%; padding: 15px; margin: 12px 0; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 16px; outline: none; }
        button { background: #2563eb; color: white; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        button:hover { background: #1d4ed8; transform: translateY(-1px); }
        #form-section, #login-section { display: none; }
        #foto { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #dbeafe; margin-bottom: 15px; object-fit: cover; }
        .loading-text { color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>BoraAli 🚗</h2>
    <div id="status" class="loading-text">Sincronizando...</div>

    <div id="login-section">
        <p style="color: #475569;">Para começar, acesse com seu Gmail:</p>
        <button onclick="login()">Entrar com Google</button>
    </div>

    <div id="form-section">
        <img id="foto" src="" alt="Sua Foto">
        <p>Olá, <strong id="nome-display"></strong>!</p>
        <input type="text" id="tel" placeholder="Seu WhatsApp (989...)">
        <select id="veiculo">
            <option value="Carro (Prisma)">Carro (Prisma)</option>
            <option value="Moto">Moto</option>
            <option value="Outro">Outro Veículo</option>
        </select>
        <button onclick="salvar()">Confirmar Cadastro</button>
    </div>
</div>

<script>
    // 1. CONFIGURAÇÃO (SUA CHAVE JÁ INCLUÍDA)
    const SUPABASE_URL = 'https://ehemdcucqzfwvbomynr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoZW1kY3VjcXpmd2V2Ym9teW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjkxNzksImV4cCI6MjA5MDg0NTE3OX0.TCp09qdrquyCNfdbgpLpMNJWA0wSMTJZcJu5CAcZ5ro';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. FUNÇÃO QUE TROCA AS TELAS NA MARRA
    function exibirApp(user) {
        document.getElementById('status').style.display = 'none';
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('form-section').style.display = 'block';
        document.getElementById('nome-display').innerText = user.user_metadata.full_name;
        document.getElementById('foto').src = user.user_metadata.avatar_url;
    }

    // 3. COMANDO DE EMERGÊNCIA AO CARREGAR A PÁGINA
    window.onload = async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            exibirApp(session.user);
        } else {
            document.getElementById('status').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }
    };

    // 4. FUNÇÃO DE LOGIN
    async function login() {
        await supabaseClient.auth.signInWithOAuth({ 
            provider: 'google', 
            options: { redirectTo: window.location.origin + window.location.pathname } 
        });
    }

    // 5. FUNÇÃO DE SALVAR NO BANCO
    async function salvar() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        const telefone = document.getElementById('tel').value;
        const carro = document.getElementById('veiculo').value;

        if (!telefone) {
            alert("Por favor, preencha seu WhatsApp.");
            return;
        }

        const { error } = await supabaseClient.from('profiles').upsert({
            id: session.user.id,
            full_name: session.user.user_metadata.full_name,
            phone: telefone,
            car_model: carro
        });

        if (error) {
            alert("Erro ao salvar: " + error.message);
        } else {
            alert("Sucesso! Cadastro confirmado no BoraAli.");
        }
    }
</script>

</body>
</html>
