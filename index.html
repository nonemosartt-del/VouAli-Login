<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BoraAli</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="text-align:center; margin-top:50px;">
        <h2>BoraAli 🚗</h2>
        <div id="login-section">
            <button onclick="login()" style="padding:10px 20px;">Entrar com Google</button>
        </div>
        <div id="form-section" style="display:none;">
            <p>Olá, <span id="nome"></span>!</p>
            <input type="text" id="tel" placeholder="WhatsApp">
            <button onclick="salvar()">Salvar</button>
        </div>
    </div>
    <script>
        const client = supabase.createClient('https://ehemdcucqzfwvbomynr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoZW1kY3VjcXpmd2V2Ym9teW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjkxNzksImV4cCI6MjA5MDg0NTE3OX0.TCp09qdrquyCNfdbgpLpMNJWA0wSMTJZcJu5CAcZ5ro');
        async function login() { await client.auth.signInWithOAuth({ provider: 'google' }); }
        client.auth.onAuthStateChange((_, session) => {
            if (session) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('form-section').style.display = 'block';
                document.getElementById('nome').innerText = session.user.user_metadata.full_name;
            }
        });
        async function salvar() {
            const { data: { user } } = await client.auth.getUser();
            await client.from('profiles').upsert({ id: user.id, phone: document.getElementById('tel').value });
            alert("Salvo!");
        }
    </script>
</body>
</html>
